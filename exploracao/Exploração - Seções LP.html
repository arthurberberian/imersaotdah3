<style>
/* ============== TOKENS — Escola do Psicólogo Master ============== */
:root{
  --noite:#0B1220;
  --noite-2:#111A2C;
  --noite-3:#1A2438;
  --noite-4:#243049;
  --off-white-warm:#F5F2E8;
  --off-white:#FAF9F4;
  --terracota:#C46D37;
  --terracota-claro:#D88959;
  --terracota-escuro:#9E5328;
  --areia:#E0C7A3;
  --azul-cinza:#C7CED6;
  --azul-cinza-2:#8E97A3;
  --azul-cinza-3:#5C6573;
  --font-display:'Fraunces', Georgia, serif;
  --font-body:'Manrope', system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;
}

html,body{margin:0;padding:0;background:#1f2937;color:#fff;font-family:var(--font-body);}
*,*::before,*::after{box-sizing:border-box;}

/* ===== Artboard frame utilities ===== */
.ab{
  background:var(--noite);
  color:var(--off-white);
  font-family:var(--font-body);
  position:relative;
  overflow:hidden;
  width:100%;
  height:100%;
}
.ab.light{background:var(--off-white-warm);color:var(--noite);}
.ab .pad{padding:24px;}

/* placeholder image utility */
.placeholder{
  background:
    repeating-linear-gradient(135deg,
      rgba(224,199,163,0.08) 0 8px,
      transparent 8px 16px),
    var(--noite-3);
  color:var(--azul-cinza-2);
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.05em;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:12px;
}
.placeholder.light{
  background:
    repeating-linear-gradient(135deg,
      rgba(11,18,32,0.07) 0 8px,
      transparent 8px 16px),
    #E8E2D0;
  color:var(--azul-cinza-3);
}

/* ===== Document title strip ===== */
.doc-header{
  position:sticky;top:0;z-index:50;
  background:#0B1220;
  border-bottom:1px solid #243049;
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--font-body);
  color:var(--off-white);
}
.doc-header .title{
  font-family:var(--font-display);
  font-style:italic;
  font-weight:500;
  font-size:18px;
}
.doc-header .meta{font-size:11px;color:var(--azul-cinza-2);letter-spacing:0.08em;text-transform:uppercase;}

/* Make the canvas fill the rest of the viewport */
.canvas-host{position:relative;height:calc(100vh - 53px);}

/* Override design_canvas styles a bit so labels read more clearly */
</style>
</head>
<body>

<div class="doc-header">
  <div class="title">Exploração — Seções da Landing Page · 3ª Imersão TDAH</div>
  <div class="meta">Mid-fi · variantes mobile + desktop · não-final</div>
</div>

<div id="root" class="canvas-host"></div>
